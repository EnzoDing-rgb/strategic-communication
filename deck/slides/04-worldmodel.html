<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>04 · 世界模型</title>
<link rel="stylesheet" href="../shared/fonts.css">
<link rel="stylesheet" href="../shared/handdrawn.css">
</head>
<body>
<div class="page-num">06</div>
<div class="slide-main">
  <p class="kicker">少的那块拼图</p>
  <h1 style="font-size:64px">世界模型 = 先模拟，再行动</h1>
  <div class="cols-2" style="margin-top:36px; gap:64px">
    <div class="sketch-box" style="padding:44px 40px">
      <h2>没有世界模型</h2>
      <div class="stack" style="gap:14px; margin-top:20px">
        <div class="stack-item" style="font-size:32px">遇到情况 → 检索经验 → 做合理的事</div>
        <div class="stack-item" style="font-size:32px; background:var(--peach)">不想「如果我说 A 而不是 B，有什么区别？」</div>
      </div>
    </div>
    <div class="sketch-box" style="padding:44px 40px; background:var(--blue)">
      <h2>有世界模型</h2>
      <div class="stack" style="gap:14px; margin-top:20px">
        <div class="stack-item" style="font-size:32px">A → 预测效果一般</div>
        <div class="stack-item" style="font-size:32px; background:var(--green)">B → 预测效果好 ✓</div>
        <div class="stack-item" style="font-size:32px">C → 预测效果差</div>
        <div class="stack-item" style="font-size:32px; background:var(--green)"><strong>选 B，执行</strong></div>
      </div>
    </div>
  </div>
  <p style="text-align:center; font-family:var(--font-hand); font-size:44px; margin-top:40px; color:var(--ink)">世界模型 = 动手之前，多跑几次「如果……会怎样」</p>
</div>
<script src="../shared/nav-keys.js"></script>
</body>
</html>
