    战略传播的核心难题：<strong>怎么在行动之前知道哪个策略更有效？</strong><br>
    现有 Agent 只会反应，不会预测后果<br>
    World Model 补上这个缺口——<strong>让战略传播从「凭经验」变成「可推演」</strong>
  </div>
  <div class="three-ideas" style="margin-top:40px">

      <p>用 Nye 三层框架论证<br>战略传播依赖效果预测</p>
    </div>
    <div class="idea-card" style="background:var(--peach)">
      <div class="icon">🔍</div>
      <h3>贡献 2</h3>
      <p>指出当前 Agent<br>只反应，不比较策略</p>
    </div>
    <div class="idea-card" style="background:var(--lavender)">
      <div class="icon">🔧</div>
      <h3>贡献 3</h3>
      <p>提出 World Model 方案<br>补上预测缺口</p>
    </div>
  </div>
  <p style="text-align:center; font-family:var(--font-hand); font-size:32px; color:var(--muted); margin-top:44px">
    开放问题：社会传播领域的状态转移函数，拿什么数据训练？
  </p>
